<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>木含 · 九宫格</title>
    <!-- Font Awesome 图标库 (免费) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8ddd0;
            /* 暖灰底色，衬托木纹 */
            background-image:
                repeating-linear-gradient(45deg,
                    rgba(180, 150, 120, 0.03) 0px,
                    rgba(180, 150, 120, 0.03) 2px,
                    transparent 2px,
                    transparent 8px),
                repeating-linear-gradient(-45deg,
                    rgba(180, 150, 120, 0.03) 0px,
                    rgba(180, 150, 120, 0.03) 2px,
                    transparent 2px,
                    transparent 8px);
            padding: 20px;
        }

        /* ===== 主卡片 ===== */
        .container {
            max-width: 720px;
            width: 100%;
            background: #f7f0e8;
            /* 米白底 */
            background-image:
                radial-gradient(circle at 10% 20%, rgba(210, 180, 150, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(180, 150, 120, 0.10) 0%, transparent 50%);
            border-radius: 48px 48px 40px 40px;
            padding: 30px 28px 38px;
            box-shadow:
                0 20px 60px rgba(120, 90, 70, 0.25),
                0 8px 24px rgba(120, 90, 70, 0.10),
                inset 0 1px 0 rgba(255, 245, 235, 0.8);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(210, 185, 160, 0.30);
            transition: box-shadow 0.3s ease;
        }

        /* ===== 顶部 ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 18px;
            border-bottom: 2px solid rgba(180, 150, 125, 0.20);
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #c9b09b, #b0957e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f5ede4;
            font-size: 26px;
            box-shadow: 0 6px 16px rgba(140, 110, 85, 0.25);
            border: 1px solid rgba(255, 235, 215, 0.35);
        }

        .header-title h1 {
            font-size: 24px;
            font-weight: 600;
            color: #5c4a3a;
            letter-spacing: 2px;
        }

        .header-title p {
            font-size: 13px;
            color: #8f7a68;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-right {
            color: #8f7a68;
            font-size: 20px;
            opacity: 0.6;
            transition: opacity 0.2s;
            cursor: default;
        }

        .header-right:hover {
            opacity: 1;
        }

        /* ===== 九宫格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        /* ===== 每个格子 ===== */
        .grid-item {
            background: rgba(245, 238, 230, 0.70);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 22px 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            border: 1px solid rgba(210, 185, 160, 0.25);
            box-shadow:
                0 6px 18px rgba(140, 110, 85, 0.08),
                inset 0 1px 0 rgba(255, 245, 235, 0.6);
            text-decoration: none;
            color: #4d3e30;
            min-height: 130px;
            position: relative;
            isolation: isolate;
        }

        /* 木纹纹理叠加 (每个格子独立木纹) */
        .grid-item::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            background-image:
                repeating-linear-gradient(85deg,
                    transparent 0px,
                    transparent 6px,
                    rgba(180, 150, 120, 0.04) 6px,
                    rgba(180, 150, 120, 0.04) 7px,
                    transparent 7px,
                    transparent 14px),
                repeating-linear-gradient(175deg,
                    transparent 0px,
                    transparent 10px,
                    rgba(150, 120, 95, 0.03) 10px,
                    rgba(150, 120, 95, 0.03) 11px,
                    transparent 11px,
                    transparent 22px);
            pointer-events: none;
            z-index: 0;
        }

        .grid-item>* {
            position: relative;
            z-index: 1;
        }

        /* 悬浮效果 */
        .grid-item:hover {
            transform: translateY(-6px) scale(1.02);
            background: rgba(250, 242, 234, 0.90);
            border-color: rgba(180, 150, 125, 0.45);
            box-shadow:
                0 20px 40px rgba(130, 100, 75, 0.18),
                0 8px 20px rgba(130, 100, 75, 0.08),
                inset 0 1px 0 rgba(255, 245, 235, 0.8);
        }

        .grid-item:active {
            transform: translateY(-2px) scale(0.98);
            transition-duration: 0.08s;
        }

        /* ===== 图标 ===== */
        .grid-item .icon {
            font-size: 36px;
            margin-bottom: 8px;
            background: linear-gradient(145deg, #b8a08b, #9c8572);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 6px rgba(140, 110, 85, 0.15));
            transition: all 0.3s ease;
        }

        .grid-item:hover .icon {
            transform: scale(1.06);
            filter: drop-shadow(0 4px 12px rgba(140, 110, 85, 0.25));
        }

        /* ===== 文字 ===== */
        .grid-item .label {
            font-size: 15px;
            font-weight: 500;
            color: #4d3e30;
            letter-spacing: 0.5px;
            background: rgba(245, 238, 230, 0.40);
            padding: 2px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(210, 185, 160, 0.15);
            transition: all 0.2s ease;
        }

        .grid-item:hover .label {
            background: rgba(235, 220, 208, 0.50);
            border-color: rgba(180, 150, 125, 0.25);
        }

        .grid-item .desc {
            font-size: 11px;
            color: #9a8676;
            margin-top: 4px;
            opacity: 0.7;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        /* ===== 每个格子单独配色 (木含风格 大地色系) ===== */
        .item-1 .icon {
            background: linear-gradient(145deg, #c9a88b, #af8b72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-1:hover {
            background: rgba(245, 228, 215, 0.85);
        }

        .item-2 .icon {
            background: linear-gradient(145deg, #b8a08b, #95806d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-2:hover {
            background: rgba(238, 224, 212, 0.85);
        }

        .item-3 .icon {
            background: linear-gradient(145deg, #c2a58a, #a5876e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-3:hover {
            background: rgba(240, 222, 208, 0.85);
        }

        .item-4 .icon {
            background: linear-gradient(145deg, #b5957c, #9a7c64);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-4:hover {
            background: rgba(235, 218, 204, 0.85);
        }

        .item-5 .icon {
            background: linear-gradient(145deg, #c8ad94, #ab8d76);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-5:hover {
            background: rgba(242, 226, 214, 0.85);
        }

        .item-6 .icon {
            background: linear-gradient(145deg, #bda088, #a1826a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-6:hover {
            background: rgba(238, 220, 206, 0.85);
        }

        .item-7 .icon {
            background: linear-gradient(145deg, #c4a890, #a78871);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-7:hover {
            background: rgba(240, 224, 212, 0.85);
        }

        .item-8 .icon {
            background: linear-gradient(145deg, #b3967e, #947a64);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-8:hover {
            background: rgba(232, 214, 200, 0.85);
        }

        .item-9 .icon {
            background: linear-gradient(145deg, #bfa48c, #a1856e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .item-9:hover {
            background: rgba(244, 228, 216, 0.85);
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 13px;
            color: #b3a192;
            letter-spacing: 2px;
            border-top: 1px solid rgba(180, 150, 125, 0.15);
            padding-top: 18px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer span {
            opacity: 0.7;
            transition: opacity 0.2s;
            cursor: default;
        }

        .footer span:hover {
            opacity: 1;
        }

        .footer i {
            margin: 0 6px;
            font-size: 12px;
            color: #c4b2a2;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .container {
                padding: 20px 16px 28px;
                border-radius: 32px;
            }

            .header-title h1 {
                font-size: 20px;
            }
            .header-title p {
                font-size: 11px;
            }
            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
                border-radius: 14px;
            }

            .grid {
                gap: 12px;
            }

            .grid-item {
                min-height: 110px;
                padding: 16px 6px 14px;
                border-radius: 22px;
            }

            .grid-item .icon {
                font-size: 28px;
                margin-bottom: 4px;
            }

            .grid-item .label {
                font-size: 13px;
                padding: 1px 10px;
            }

            .grid-item .desc {
                font-size: 10px;
                margin-top: 2px;
            }

            .footer {
                font-size: 11px;
                gap: 12px;
            }
        }

        @media (max-width: 420px) {
            .grid {
                gap: 10px;
            }
            .grid-item {
                min-height: 90px;
                padding: 12px 4px 10px;
                border-radius: 18px;
            }
            .grid-item .icon {
                font-size: 24px;
            }
            .grid-item .label {
                font-size: 12px;
            }
            .header-title h1 {
                font-size: 17px;
            }
            .container {
                padding: 16px 12px 22px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ====== 头部 ====== -->
        <div class="header">
            <div class="header-left">
                <div class="logo-icon">
                    <i class="fas fa-tree"></i>
                </div>
                <div class="header-title">
                    <h1>木 含</h1>
                    <p>· 自然 · 简素 ·</p>
                </div>
            </div>
            <div class="header-right">
                <i class="fas fa-ellipsis-h"></i>
            </div>
        </div>

        <!-- ====== 九宫格 ====== -->
        <div class="grid">

            <!-- 1 -->
            <a href="#" class="grid-item item-1" data-page="home">
                <div class="icon"><i class="fas fa-home"></i></div>
                <div class="label">首页</div>
                <div class="desc">回到起点</div>
            </a>

            <!-- 2 -->
            <a href="#" class="grid-item item-2" data-page="discover">
                <div class="icon"><i class="fas fa-compass"></i></div>
                <div class="label">探索</div>
                <div class="desc">发现美好</div>
            </a>

            <!-- 3 -->
            <a href="#" class="grid-item item-3" data-page="gallery">
                <div class="icon"><i class="fas fa-images"></i></div>
                <div class="label">图库</div>
                <div class="desc">木作光影</div>
            </a>

            <!-- 4 -->
            <a href="#" class="grid-item item-4" data-page="journal">
                <div class="icon"><i class="fas fa-feather-alt"></i></div>
                <div class="label">手记</div>
                <div class="desc">随笔记录</div>
            </a>

            <!-- 5 -->
            <a href="#" class="grid-item item-5" data-page="craft">
                <div class="icon"><i class="fas fa-hammer"></i></div>
                <div class="label">工坊</div>
                <div class="desc">匠心手作</div>
            </a>

            <!-- 6 -->
            <a href="#" class="grid-item item-6" data-page="tea">
                <div class="icon"><i class="fas fa-mug-hot"></i></div>
                <div class="label">茶事</div>
                <div class="desc">一壶清欢</div>
            </a>

            <!-- 7 -->
            <a href="#" class="grid-item item-7" data-page="music">
                <div class="icon"><i class="fas fa-music"></i></div>
                <div class="label">音律</div>
                <div class="desc">松风竹韵</div>
            </a>

            <!-- 8 -->
            <a href="#" class="grid-item item-8" data-page="garden">
                <div class="icon"><i class="fas fa-leaf"></i></div>
                <div class="label">庭院</div>
                <div class="desc">四时草木</div>
            </a>

            <!-- 9 -->
            <a href="#" class="grid-item item-9" data-page="about">
                <div class="icon"><i class="fas fa-user-circle"></i></div>
                <div class="label">关于</div>
                <div class="desc">木含其人</div>
            </a>

        </div>

        <!-- ====== 底部 ====== -->
        <div class="footer">
            <span><i class="fas fa-circle"></i> 木含 · 九宫</span>
            <span><i class="fas fa-circle"></i> 点击跳转</span>
            <span><i class="fas fa-circle"></i> 温润如木</span>
        </div>

    </div>

    <!-- ====== JavaScript 跳转逻辑 ====== -->
    <script>
        (function() {
            const items = document.querySelectorAll('.grid-item');

            // 模拟页面映射 (实际可替换为真实 URL)
            const pageMap = {
                home: 'home.html',
                discover: '../0001/index.html',
                gallery: 'gallery.html',
                journal: 'journal.html',
                craft: 'craft.html',
                tea: 'tea.html',
                music: 'music.html',
                garden: 'garden.html',
                about: 'about.html'
            };

            // 点击跳转
            items.forEach((item) => {
                item.addEventListener('click', function(e) {
                    e.preventDefault(); // 阻止默认 # 跳转

                    const pageKey = this.dataset.page;
                    const targetUrl = pageMap[pageKey] || '#';

                    if (targetUrl && targetUrl !== '#') {
                        // 模拟跳转 —— 在真实环境中改为 window.location.href = targetUrl;
                        // 这里为了演示，用 alert 显示要跳转的页面，同时控制台输出
                        console.log(`📍 跳转至: ${targetUrl}`);
                        alert(`🌿 跳转至 「${this.querySelector('.label').textContent}」页面\n→ ${targetUrl}\n(实际项目中替换为真实 URL)`);

                        // 真实跳转 (取消注释即可使用)
                        // window.location.href = targetUrl;
                    } else {
                        alert('🌱 该页面暂未配置跳转地址');
                    }
                });
            });

            // 增加一点“木含”风格的点击反馈 (波纹感)
            items.forEach((item) => {
                item.addEventListener('mousedown', function(e) {
                    this.style.transition = 'transform 0.06s ease';
                });
                item.addEventListener('mouseup', function(e) {
                    this.style.transition = 'transform 0.25s cubic-bezier(0.22, 1, 0.36, 1)';
                });
            });

            console.log('🌳 木含 · 九宫格已加载');
        })();
    </script>

</body>
</html>
